name: "fake-news-verifier"
version: "1.0.0"
env_class: "server.logic.FakeNewsLogic"
description: "Simulates a fact-checking task where an agent verifies news headlines."

tasks:
  - id: "task-1"
    input:
      headline: "NASA confirms Moon is Swiss Cheese."
    expected_output:
      label: "false"
      required_keyword: "science"

  - id: "task-2"
    input:
      headline: "New policy: 1000 units for all tomorrow."
    expected_output:
      label: "true"
      required_keyword: "gazette"

  - id: "task-3"
    input:
      headline: "Coffee leads to 20% IQ increase."
    expected_output:
      label: "false"
      required_keyword: "study"
